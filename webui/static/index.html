<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Auditor WebUI</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/app.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>Codex Auditor</h1>
            <p>Target / Session</p>
          </div>
          <button id="themeToggle" class="icon-button" type="button" title="切换到暗色" aria-label="切换到暗色">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.5 14.3A8.5 8.5 0 0 1 9.7 3.5 8.5 8.5 0 1 0 20.5 14.3Z"></path>
            </svg>
          </button>
        </div>
        <button id="newTargetButton" class="primary-button full-button" type="button">新建目标</button>
        <div id="targetTree" class="target-tree"></div>
      </aside>

      <main class="main-pane">
        <section class="vulnerability-pane">
          <div class="pane-header">
            <div>
              <h2>漏洞列表</h2>
              <p id="vulnerabilityMeta">未选择目标</p>
            </div>
            <div class="header-actions">
              <button id="refreshVulnerabilities" class="icon-button" type="button" title="刷新" aria-label="刷新漏洞列表">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 11a8 8 0 0 0-13.5-5.8L4 7.7"></path>
                  <path d="M4 4v3.7h3.7"></path>
                  <path d="M4 13a8 8 0 0 0 13.5 5.8L20 16.3"></path>
                  <path d="M20 20v-3.7h-3.7"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>summary</th>
                  <th>bug type</th>
                  <th>security rating</th>
                  <th>source files</th>
                </tr>
              </thead>
              <tbody id="vulnerabilityRows">
                <tr><td colspan="4" class="empty-cell">暂无数据</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="chat-pane">
          <div id="messages" class="messages"></div>
          <form id="messageForm" class="message-form">
            <button id="stopButton" class="stop-button" type="button" aria-label="停止当前运行" disabled></button>
            <input id="messageInput" autocomplete="off" placeholder="输入消息" disabled>
            <button id="sendButton" class="send-button" type="submit" aria-label="发送消息" title="发送" disabled>↑</button>
          </form>
        </section>
      </main>
    </div>

    <dialog id="targetModal" class="modal">
      <form id="targetForm" method="dialog" class="modal-body">
        <header class="modal-header">
          <h3>新建目标</h3>
          <button class="icon-button" type="button" data-close="targetModal">×</button>
        </header>
        <label>目标名称<input id="targetName" autocomplete="off" required></label>
        <label>补充说明<textarea id="targetNote"></textarea></label>
        <div id="targetExpandBox" class="expand-box hidden">
          <label>AI 扩写结果<textarea id="targetExpanded" readonly></textarea></label>
          <button id="copyTargetExpanded" class="secondary-button" type="button">复制到补充说明</button>
        </div>
        <div class="form-actions">
          <button class="secondary-button" type="button" data-close="targetModal">取消</button>
          <button id="expandTargetNote" class="secondary-button" type="button">AI 扩写补充说明</button>
          <button class="primary-button" type="submit">确定</button>
        </div>
      </form>
    </dialog>

    <dialog id="noteModal" class="modal">
      <form id="noteForm" method="dialog" class="modal-body">
        <header class="modal-header">
          <h3 id="noteModalTitle">更新补充说明</h3>
          <button class="icon-button" type="button" data-close="noteModal">×</button>
        </header>
        <label>补充说明<textarea id="noteText"></textarea></label>
        <div id="noteExpandBox" class="expand-box hidden">
          <label>AI 扩写结果<textarea id="noteExpanded" readonly></textarea></label>
          <button id="copyNoteExpanded" class="secondary-button" type="button">复制到补充说明</button>
        </div>
        <div class="form-actions">
          <button class="secondary-button" type="button" data-close="noteModal">取消</button>
          <button id="expandExistingNote" class="secondary-button" type="button">AI 扩写补充说明</button>
          <button class="primary-button" type="submit">确定</button>
        </div>
      </form>
    </dialog>

    <dialog id="debugModal" class="modal">
      <form id="debugForm" method="dialog" class="modal-body">
        <header class="modal-header">
          <h3 id="debugModalTitle">新建 debug session</h3>
          <button class="icon-button" type="button" data-close="debugModal">×</button>
        </header>
        <label>会话名<input id="debugName" autocomplete="off" placeholder="debug"></label>
        <label>初始提示词<textarea id="debugPrompt"></textarea></label>
        <label class="check-row"><input id="debugStart" type="checkbox" checked> 创建后立即发送初始提示词</label>
        <div class="form-actions">
          <button class="secondary-button" type="button" data-close="debugModal">取消</button>
          <button class="primary-button" type="submit">确定</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast hidden"></div>
    <script src="static/app.js"></script>
  </body>
</html>
